          <div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:4px">${r.영역} — ${r.반영방법}</div>
          <table class="adm-table" style="font-size:13px">
            <thead><tr><th style="background:#f1f5f9;color:#475569">등급</th>${r.scores.map((_,i) => `<th style="background:#f1f5f9;color:#475569;text-align:center">${i+1}</th>`).join('')}</tr></thead>
            <tbody><tr><td style="font-weight:700;color:#1e293b">점수</td>${r.scores.map(s => `<td style="text-align:center;font-weight:600;color:#2563eb">${s}</td>`).join('')}</tr></tbody>
          </table>
        </div>`).join('')}

      ${d.enrollmentImg ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#6366f1">전형별 모집인원</div>

          ${(Array.isArray(d.enrollmentImg) ? d.enrollmentImg : [d.enrollmentImg]).map(img => `
            <img src="${img}" alt="전형별 모집인원" style="width:100%;max-width:100%;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:8px;cursor:zoom-in" onclick="this.style.maxWidth=this.style.maxWidth==='100%'?'none':'100%';this.style.cursor=this.style.maxWidth==='100%'?'zoom-in':'zoom-out'">
          `).join('')}
        </div>
        <div style="font-size:13px;color:#64748b;margin-top:4px">※ 이미지를 클릭하면 확대/축소됩니다</div>
      </div>` : ''}

      ${d.top10Susi ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#f59e0b">원서접수 TOP 10 — 수시 (2025학년도)</div>
        <table class="adm-table" style="font-size:13px">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569;width:24px">#</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">모집단위</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">전형명</th>
            <th style="background:#f1f5f9;color:#475569;width:40px">모집</th>
            <th style="background:#f1f5f9;color:#475569;width:48px">지원</th>
            <th style="background:#f1f5f9;color:#475569;width:60px">경쟁률</th>
          </tr></thead>
          <tbody>${d.top10Susi.map(r => `<tr>
            <td style="text-align:center;font-weight:800;color:#f59e0b">${r.rank}</td>
            <td style="text-align:left;font-weight:600;color:#1e293b">${r.dept}</td>
            <td style="text-align:left;font-size:13px;color:#64748b">${r.type}</td>
            <td style="text-align:center;font-weight:700;color:#3b82f6">${r.모집}</td>
            <td style="text-align:center;color:#475569">${r.지원.toLocaleString()}</td>
            <td style="text-align:center;font-weight:700;color:#dc2626">${r.경쟁}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      ${d.top10Jeongsi ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#0ea5e9">원서접수 TOP 10 — 정시 (2025학년도)</div>
        <table class="adm-table" style="font-size:13px">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569;width:24px">#</th>
            <th style="background:#f1f5f9;color:#475569;width:50px">시기</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">모집단위</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">전형명</th>
            <th style="background:#f1f5f9;color:#475569;width:40px">모집</th>
            <th style="background:#f1f5f9;color:#475569;width:48px">지원</th>
            <th style="background:#f1f5f9;color:#475569;width:60px">경쟁률</th>
          </tr></thead>
          <tbody>${d.top10Jeongsi.map(r => `<tr>
            <td style="text-align:center;font-weight:800;color:#0ea5e9">${r.rank}</td>
            <td style="text-align:center;font-size:13px;color:#64748b">${r.시기}</td>
            <td style="text-align:left;font-weight:600;color:#1e293b">${r.dept}</td>
            <td style="text-align:left;font-size:13px;color:#64748b">${r.type}</td>
            <td style="text-align:center;font-weight:700;color:#3b82f6">${r.모집}</td>
            <td style="text-align:center;color:#475569">${r.지원.toLocaleString()}</td>
            <td style="text-align:center;font-weight:700;color:#dc2626">${r.경쟁}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      <div class="detail-note">
        <strong>※ 주의사항</strong><br>
        본 자료는 2027 대입전형 시행계획 기준으로 작성되었습니다.<br>
        세부 모집인원 및 일정은 각 대학 모집요강(5월 말 발표 예정)을 반드시 확인하시기 바랍니다.<br>
        경쟁률·취업률 등 통계자료 출처: <strong>adiga.kr</strong> (대입정보포털)
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// Init: read URL params and show detail
// ═══════════════════════════════════════════
(function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const targetUni = urlParams.get('uni');
  if (targetUni) {
    showUniversityDetail(targetUni);
  } else {
    document.getElementById('info-panel').innerHTML = '<div style="padding:40px;text-align:center;color:#64748b">대학을 선택해주세요</div>';
  }
})();
</script>
