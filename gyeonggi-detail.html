// Back to list — tell parent to restore
function renderGyeonggiSummary() {
  if (window.parent !== window) {
    window.parent.postMessage({type:'backToList'}, '*');
    return;
  }
}

function showUniversityDetail(key) {
  let d = UNI_DETAILS[key];
  if (!d) {
    const found = Object.keys(UNI_DETAILS).find(k => key.includes(k) || k.includes(key));
    if (found) d = UNI_DETAILS[found];
  }
  document.getElementById('info-panel').classList.add('wide');

  if (!d) {
    document.getElementById('info-panel').innerHTML = `
      <div class="detail-page">
        <div class="detail-header">
          <div class="detail-nav">
            <button class="detail-back" onclick="renderGyeonggiSummary()">← 목록으로</button>
          </div>
          <div class="detail-uni-name">${key}</div>
        </div>
        <div class="no-data">
          <div style="font-size:32px;margin-bottom:12px">📋</div>
          <div style="color:#64748b;font-size:14px;font-weight:600">상세 정보 준비중</div>
          <div style="color:#334155;font-size:13px;margin-top:8px">2027 모집요강 발표 후 업데이트 예정입니다</div>
        </div>
      </div>`;
    return;
  }

  const badgeHtml = (d.badges||[]).map(b => {
    if(b==='seoul') return '<span class="detail-badge badge-seoul">서울권</span>';
    if(b==='gyeonggi') return '<span class="detail-badge badge-gyeonggi">경기·인천권</span>';
    if(b==='national') return '<span class="detail-badge badge-national">국립</span>';
    if(b==='med') return '<span class="detail-badge badge-med">의학계열</span>';
    if(b==='new2028') return '<span class="detail-badge badge-new2028">N 2028</span>';
    return '';
  }).join('');

  // Changes section
  const changesHtml = (d.changes||[]).map(c => `
    <div class="change-item">
      <div class="change-title">▪ ${c.title}</div>
      <div class="change-arrow">
        <span class="from">2027: ${c.from}</span>
        <span class="arr">→</span>
        <span class="to">2028: ${c.to}</span>
      </div>
    </div>`).join('');

  // 수시 table
  const susiRows = (d.susi||[]).map(r => {
    const typeClass = r.type==='교과'?'gyogwa':r.type==='종합'?'jonghap':'nonsul';
    const minHtml = r.minReq && r.minReq!=='—'
      ? `<span class="dot-req">${r.minReq}</span>` : `<span style="color:#334155">—</span>`;
    return `<tr>
      <td class="td-type ${typeClass}">${r.type}</td>
      <td class="td-name">${r.name}</td>
      <td class="td-count">${r.count}</td>
      <td class="td-min">${minHtml}</td>
      <td class="td-method">${r.method.replace(/❶/g,'<span class="step">❶</span>').replace(/❷/g,'<span class="step">❷</span>')}</td>
    </tr>`;
  }).join('');

            return `<div style="flex:1;min-width:100px;background:${c}11;border:1px solid ${c}44;border-radius:8px;padding:10px 12px;text-align:center">
              <div style="font-size:20px;font-weight:900;color:${c}">${item.pct}%</div>
              <div style="font-size:13px;color:#64748b;margin-top:2px">${item.type}</div>
            </div>`;
          }).join('')}
        </div>
        ${d.distribution.history ? `
        <table class="adm-table" style="font-size:13px">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569">연도</th>
            <th style="background:#f1f5f9;color:#475569">교과</th>
            <th style="background:#f1f5f9;color:#475569">종합</th>
            <th style="background:#f1f5f9;color:#475569">실기</th>
            <th style="background:#f1f5f9;color:#475569">논술</th>
            <th style="background:#f1f5f9;color:#475569">수능</th>
          </tr></thead>
          <tbody>${d.distribution.history.map(h => `<tr>
            <td style="font-weight:700;text-align:center">${h.year}</td>
            <td style="text-align:center;color:#3b82f6;font-weight:600">${h.교과}%</td>
            <td style="text-align:center;color:#f97316;font-weight:600">${h.종합}%</td>
            <td style="text-align:center;color:#10b981;font-weight:600">${h.실기}%</td>
            <td style="text-align:center;color:#6366f1;font-weight:600">${h.논술}%</td>
            <td style="text-align:center;color:#eab308;font-weight:600">${h.수능}%</td>
          </tr>`).join('')}</tbody>
        </table>` : ''}
      </div>` : ''}

      ${d.enrollmentStats ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#f97316">모집인원 현황</div>
        <table class="adm-table" style="font-size:13px">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569">연도</th>
            <th style="background:#f1f5f9;color:#475569">수시 모집</th>
            <th style="background:#f1f5f9;color:#475569">수시 지원</th>
            <th style="background:#f1f5f9;color:#475569">수시 경쟁률</th>
            <th style="background:#f1f5f9;color:#475569">정시 모집</th>
            <th style="background:#f1f5f9;color:#475569">정시 지원</th>
            <th style="background:#f1f5f9;color:#475569">정시 경쟁률</th>
          </tr></thead>
          <tbody>${d.enrollmentStats.map(r => `<tr>
            <td style="font-weight:700;text-align:center">${r.year}</td>
            <td style="text-align:center;color:#3b82f6;font-weight:600">${r.수시모집.toLocaleString()}</td>
            <td style="text-align:center;color:#64748b">${r.수시지원.toLocaleString()}</td>
            <td style="text-align:center;color:#2563eb;font-weight:700">${(r.수시지원/r.수시모집).toFixed(2)}:1</td>
            <td style="text-align:center;color:#ef4444;font-weight:600">${r.정시모집.toLocaleString()}</td>
            <td style="text-align:center;color:#64748b">${r.정시지원.toLocaleString()}</td>
            <td style="text-align:center;color:#dc2626;font-weight:700">${(r.정시지원/r.정시모집).toFixed(2)}:1</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      ${d.competitionRate ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#10b981">경쟁률(정원내) 추이</div>
        <div style="display:flex;gap:8px">
          ${d.competitionRate.map(r => `
          <div style="flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:13px;color:#64748b;margin-bottom:6px">${r.year}학년도</div>
            <div style="display:flex;justify-content:center;gap:12px">
              <div><div style="font-size:18px;font-weight:900;color:#3b82f6">${r.수시}</div><div style="font-size:13px;color:#64748b">수시</div></div>
              <div><div style="font-size:18px;font-weight:900;color:#ef4444">${r.정시}</div><div style="font-size:13px;color:#64748b">정시</div></div>
            </div>
          </div>`).join('')}
        </div>
      </div>` : ''}

      ${d.top10Susi ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#f59e0b">원서접수 TOP 10 — 수시 (2025학년도)</div>
        <table class="adm-table" style="font-size:13px">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569;width:24px">#</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">모집단위</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">전형명</th>
            <th style="background:#f1f5f9;color:#475569;width:40px">모집</th>
            <th style="background:#f1f5f9;color:#475569;width:48px">지원</th>
            <th style="background:#f1f5f9;color:#475569;width:60px">경쟁률</th>
          </tr></thead>
          <tbody>${d.top10Susi.map(r => `<tr>
            <td style="text-align:center;font-weight:800;color:#f59e0b">${r.rank}</td>
            <td style="text-align:left;font-weight:600;color:#1e293b">${r.dept}</td>
            <td style="text-align:left;font-size:13px;color:#64748b">${r.type}</td>
            <td style="text-align:center;font-weight:700;color:#3b82f6">${r.모집}</td>
            <td style="text-align:center;color:#475569">${r.지원.toLocaleString()}</td>
            <td style="text-align:center;font-weight:700;color:#dc2626">${r.경쟁}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      ${d.top10Jeongsi ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#0ea5e9">원서접수 TOP 10 — 정시 (2025학년도)</div>
        <table class="adm-table" style="font-size:13px">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569;width:24px">#</th>
            <th style="background:#f1f5f9;color:#475569;width:50px">시기</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">모집단위</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">전형명</th>
            <th style="background:#f1f5f9;color:#475569;width:40px">모집</th>
            <th style="background:#f1f5f9;color:#475569;width:48px">지원</th>
            <th style="background:#f1f5f9;color:#475569;width:60px">경쟁률</th>
          </tr></thead>
          <tbody>${d.top10Jeongsi.map(r => `<tr>
            <td style="text-align:center;font-weight:800;color:#0ea5e9">${r.rank}</td>
            <td style="text-align:center;font-size:13px;color:#64748b">${r.시기}</td>
            <td style="text-align:left;font-weight:600;color:#1e293b">${r.dept}</td>
            <td style="text-align:left;font-size:13px;color:#64748b">${r.type}</td>
            <td style="text-align:center;font-weight:700;color:#3b82f6">${r.모집}</td>
            <td style="text-align:center;color:#475569">${r.지원.toLocaleString()}</td>
            <td style="text-align:center;font-weight:700;color:#dc2626">${r.경쟁}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      ${d.employmentRate ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#10b981">취업률 현황</div>
        <div style="display:flex;gap:8px">
          ${d.employmentRate.map(r => `
          <div style="flex:1;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:13px;color:#64748b">${r.year}년</div>
            <div style="font-size:22px;font-weight:900;color:#16a34a">${r.rate}%</div>
          </div>`).join('')}
        </div>
      </div>` : ''}

      <div class="detail-note">
        <strong>※ 주의사항</strong><br>
        본 자료는 2027 대입전형 시행계획 기준으로 작성되었습니다.<br>
        세부 모집인원 및 일정은 각 대학 모집요강(5월 말 발표 예정)을 반드시 확인하시기 바랍니다.<br>
        경쟁률·취업률 등 통계자료 출처: <strong>adiga.kr</strong> (대입정보포털)
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// Init: read URL params and show detail
// ═══════════════════════════════════════════
(function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const targetUni = urlParams.get('uni');
  if (targetUni) {
    showUniversityDetail(targetUni);
  } else {
    document.getElementById('info-panel').innerHTML = '<div style="padding:40px;text-align:center;color:#64748b">대학을 선택해주세요</div>';
  }
})();
</script>
</body>
