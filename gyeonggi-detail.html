            return `<div style="flex:1;min-width:100px;background:${c}11;border:1px solid ${c}44;border-radius:8px;padding:10px 12px;text-align:center">
              <div style="font-size:20px;font-weight:900;color:${c}">${item.pct}%</div>
              <div style="font-size:10px;color:#64748b;margin-top:2px">${item.type}</div>
            </div>`;
          }).join('')}
        </div>
        ${d.distribution.history ? `
        <table class="adm-table" style="font-size:12px">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569">연도</th>
            <th style="background:#3b82f6;color:#fff">교과</th>
            <th style="background:#f97316;color:#fff">종합</th>
            <th style="background:#10b981;color:#fff">실기</th>
            <th style="background:#6366f1;color:#fff">논술</th>
            <th style="background:#eab308;color:#fff">수능</th>
          </tr></thead>
          <tbody>${d.distribution.history.map(h => `<tr>
            <td style="font-weight:700;text-align:center">${h.year}</td>
            <td style="text-align:center;color:#3b82f6;font-weight:600">${h.교과}%</td>
            <td style="text-align:center;color:#f97316;font-weight:600">${h.종합}%</td>
            <td style="text-align:center;color:#10b981;font-weight:600">${h.실기}%</td>
            <td style="text-align:center;color:#6366f1;font-weight:600">${h.논술}%</td>
            <td style="text-align:center;color:#eab308;font-weight:600">${h.수능}%</td>
          </tr>`).join('')}</tbody>
        </table>` : ''}
      </div>` : ''}

      ${d.enrollmentStats ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#f97316">모집인원 현황</div>
        <table class="adm-table" style="font-size:12px">
          <thead><tr>
            <th style="background:#334155;color:#fff">연도</th>
            <th style="background:#3b82f6;color:#fff">수시 모집</th>
            <th style="background:#3b82f6;color:#fff">수시 지원</th>
            <th style="background:#3b82f6;color:#fff">수시 경쟁률</th>
            <th style="background:#ef4444;color:#fff">정시 모집</th>
            <th style="background:#ef4444;color:#fff">정시 지원</th>
            <th style="background:#ef4444;color:#fff">정시 경쟁률</th>
          </tr></thead>
          <tbody>${d.enrollmentStats.map(r => `<tr>
            <td style="font-weight:700;text-align:center">${r.year}</td>
            <td style="text-align:center;color:#3b82f6;font-weight:600">${r.수시모집.toLocaleString()}</td>
            <td style="text-align:center;color:#64748b">${r.수시지원.toLocaleString()}</td>
            <td style="text-align:center;color:#2563eb;font-weight:700">${(r.수시지원/r.수시모집).toFixed(2)}:1</td>
            <td style="text-align:center;color:#ef4444;font-weight:600">${r.정시모집.toLocaleString()}</td>
            <td style="text-align:center;color:#64748b">${r.정시지원.toLocaleString()}</td>
            <td style="text-align:center;color:#dc2626;font-weight:700">${(r.정시지원/r.정시모집).toFixed(2)}:1</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      ${d.competitionRate ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#10b981">경쟁률(정원내) 추이</div>
        <div style="display:flex;gap:8px">
          ${d.competitionRate.map(r => `
          <div style="flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:11px;color:#94a3b8;margin-bottom:6px">${r.year}학년도</div>
            <div style="display:flex;justify-content:center;gap:12px">
              <div><div style="font-size:18px;font-weight:900;color:#3b82f6">${r.수시}</div><div style="font-size:9px;color:#94a3b8">수시</div></div>
              <div><div style="font-size:18px;font-weight:900;color:#ef4444">${r.정시}</div><div style="font-size:9px;color:#94a3b8">정시</div></div>
            </div>
          </div>`).join('')}
        </div>
      </div>` : ''}

      ${d.top10Susi ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#f59e0b">원서접수 TOP 10 — 수시 (2025학년도)</div>
        <table class="adm-table" style="font-size:12px">
          <thead><tr>
            <th style="background:#334155;color:#fff;width:24px">#</th>
            <th style="background:#334155;color:#fff;text-align:left">모집단위</th>
            <th style="background:#334155;color:#fff;text-align:left">전형명</th>
            <th style="background:#334155;color:#fff;width:40px">모집</th>
            <th style="background:#334155;color:#fff;width:48px">지원</th>
            <th style="background:#334155;color:#fff;width:60px">경쟁률</th>
          </tr></thead>
          <tbody>${d.top10Susi.map(r => `<tr>
            <td style="text-align:center;font-weight:800;color:#f59e0b">${r.rank}</td>
            <td style="text-align:left;font-weight:600;color:#1e293b">${r.dept}</td>
            <td style="text-align:left;font-size:10px;color:#64748b">${r.type}</td>
            <td style="text-align:center;font-weight:700;color:#3b82f6">${r.모집}</td>
            <td style="text-align:center;color:#475569">${r.지원.toLocaleString()}</td>
            <td style="text-align:center;font-weight:700;color:#dc2626">${r.경쟁}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      ${d.top10Jeongsi ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#0ea5e9">원서접수 TOP 10 — 정시 (2025학년도)</div>
        <table class="adm-table" style="font-size:12px">
          <thead><tr>
            <th style="background:#0e4272;color:#fff;width:24px">#</th>
            <th style="background:#0e4272;color:#fff;width:50px">시기</th>
            <th style="background:#0e4272;color:#fff;text-align:left">모집단위</th>
            <th style="background:#0e4272;color:#fff;text-align:left">전형명</th>
            <th style="background:#0e4272;color:#fff;width:40px">모집</th>
            <th style="background:#0e4272;color:#fff;width:48px">지원</th>
            <th style="background:#0e4272;color:#fff;width:60px">경쟁률</th>
          </tr></thead>
          <tbody>${d.top10Jeongsi.map(r => `<tr>
            <td style="text-align:center;font-weight:800;color:#0ea5e9">${r.rank}</td>
            <td style="text-align:center;font-size:10px;color:#64748b">${r.시기}</td>
            <td style="text-align:left;font-weight:600;color:#1e293b">${r.dept}</td>
            <td style="text-align:left;font-size:10px;color:#64748b">${r.type}</td>
            <td style="text-align:center;font-weight:700;color:#3b82f6">${r.모집}</td>
            <td style="text-align:center;color:#475569">${r.지원.toLocaleString()}</td>
            <td style="text-align:center;font-weight:700;color:#dc2626">${r.경쟁}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      ${d.employmentRate ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#10b981">취업률 현황</div>
        <div style="display:flex;gap:8px">
          ${d.employmentRate.map(r => `
          <div style="flex:1;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:11px;color:#94a3b8">${r.year}년</div>
            <div style="font-size:22px;font-weight:900;color:#16a34a">${r.rate}%</div>
          </div>`).join('')}
        </div>
      </div>` : ''}

      <div class="detail-note">
        <strong>※ 주의사항</strong><br>
        본 자료는 2027 대입전형 시행계획 기준으로 작성되었습니다.<br>
        세부 모집인원 및 일정은 각 대학 모집요강(5월 말 발표 예정)을 반드시 확인하시기 바랍니다.<br>
        경쟁률·취업률 등 통계자료 출처: <strong>adiga.kr</strong> (대입정보포털)
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// Init: read URL params and show detail
// ═══════════════════════════════════════════
(function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const targetUni = urlParams.get('uni');
  if (targetUni) {
    showUniversityDetail(targetUni);
  } else {
    document.getElementById('info-panel').innerHTML = '<div style="padding:40px;text-align:center;color:#94a3b8">대학을 선택해주세요</div>';
  }
})();
</script>
