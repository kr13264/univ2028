  document.getElementById('info-panel').classList.add('wide');

  if (!d) {
    document.getElementById('info-panel').innerHTML = `

// Initialize: inject markers and show summary
// ═══════════════════════════════════════════
(function init() {
  const container = document.getElementById('uni-map-container');
  container.innerHTML = `<img src="images/metro-map.png" alt="수도권 대학 지도" draggable="false"><div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.5);pointer-events:none;border-radius:8px"></div>`;

  // Inject university markers
  GYEONGGI_MARKERS.forEach(([key, x, y, side, color]) => {
    const btn = document.createElement('button');
    btn.className = 'uni-marker';
    btn.title = key;
    btn.style.cssText = `left:${x}%;top:${y}%;position:absolute;background:none;border:none;padding:2px;`;

    const dot = document.createElement('span');
    dot.className = 'uni-dot';
    dot.style.background = color;

    const label = document.createElement('span');
    label.className = 'uni-label';
    label.textContent = key;
    label.style.color = color === '#374151' ? '#1a1a1a' : color;

    const detail = UNI_DETAILS[key];
    if (detail && (detail.badges||[]).includes('new2028')) {
      const nMark = document.createElement('span');
      nMark.textContent = 'N';
      nMark.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#e11d48;color:#fff;font-size:13px;font-weight:800;margin-left:3px;vertical-align:middle;line-height:1';
      label.appendChild(nMark);
    }

    const wrap = document.createElement('span');
    wrap.className = 'uni-label-wrap';
    if (side === 'l') {
      wrap.appendChild(label);
      wrap.appendChild(dot);
      btn.style.transform = 'translate(-100%, -50%)';
    } else {
      wrap.appendChild(dot);
      wrap.appendChild(label);
      btn.style.transform = 'translate(0%, -50%)';
    }
    btn.appendChild(wrap);

    btn.addEventListener('click', () => {
      document.querySelectorAll('.uni-marker').forEach(m => m.classList.remove('selected'));
      btn.classList.add('selected');
      // iframe으로 상세 페이지 로드
      const panel = document.getElementById('info-panel');
      panel.classList.add('wide');
      panel.innerHTML = `<iframe src="gyeonggi-detail.html?uni=${encodeURIComponent(key)}&embed=1" style="width:100%;height:100%;border:none"></iframe>`;
    });

    container.appendChild(btn);
  });

  // Show Gyeonggi summary in info panel
  renderGyeonggiSummary();
})();

// iframe에서 "목록으로" 클릭 시 복원
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'backToList') {
    const panel = document.getElementById('info-panel');
    panel.classList.remove('wide');
    document.querySelectorAll('.uni-marker').forEach(m => m.classList.remove('selected'));
    renderGyeonggiSummary();
  }
});
