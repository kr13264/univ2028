      {name:'조선대학교',x:370,y:638,color:'#e11d48'},
      {name:'광주교대',x:398,y:642,color:'#1d4ed8'},
    ],
    universities:[{name:'전남대학교',location:'광주',national:true,tags:['수시','정시','의예'],special:['수의예','치의예','첨단학과']},{name:'전북대학교',location:'전북 전주',national:true,tags:['수시','정시','의예'],special:['수의예','치의예']},{name:'조선대학교',location:'광주',national:false,tags:['수시','정시','의예'],special:['치의예']},{name:'원광대학교',location:'전북 익산',national:false,tags:['수시','정시','의예','한의예']},{name:'광주교대',location:'광주',national:true,tags:['수시','정시'],special:['교육']}]},
  jeju:{name:'제주',color:'#0369a1',mapImage:null,mapLabel:null,description:'제주특별자치도 소재 대학교',
    detailPage:'jeju-detail.html',
    zoomViewBox:'240 860 200 120',
    markers:[
      {name:'제주대학교',x:335,y:925,color:'#1d4ed8'},
    ],
    universities:[{name:'제주대학교',location:'제주 제주시',national:true,tags:['수시','정시','의예'],special:['수의예','첨단학과']}]},

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
let selectedRegion = null;
let isZoomed = false;
const FULL_VIEWBOX = '0 0 1000 1000';

// ═══════════════════════════════════════════
// SVG viewBox animation helper
// ═══════════════════════════════════════════
function animateViewBox(svg, from, to, duration) {
  const f = from.split(' ').map(Number);
  const t = to.split(' ').map(Number);
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = p < 0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2; // easeInOutQuad
    const v = f.map((fv, i) => fv + (t[i] - fv) * ease);
    svg.setAttribute('viewBox', v.join(' '));
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════
// Zoom into a region on the SVG map
// ═══════════════════════════════════════════
function zoomToRegion(key) {
  const r = REGIONS[key];
  if (!r || !r.zoomViewBox) return;
  const svg = document.getElementById('korea-svg');
  const currentVB = svg.getAttribute('viewBox');

  isZoomed = true;
  selectedRegion = key;

  // Dim other regions
  document.querySelectorAll('.region').forEach(el => {
    el.classList.add('dimmed');
    el.style.pointerEvents = 'none';
  });
  document.querySelectorAll(`[data-region="${key}"]`).forEach(el => {
    el.classList.remove('dimmed');
    el.classList.add('active');
  });

  // Hide labels that would be too big when zoomed
  document.querySelectorAll('.map-label').forEach(l => l.style.display = 'none');
  document.getElementById('map-hint').style.display = 'none';

  // Animate viewBox
  animateViewBox(svg, currentVB, r.zoomViewBox, 600);

  // Show breadcrumb
  const bc = document.getElementById('zoom-breadcrumb');
  bc.style.display = 'flex';
  document.getElementById('zoom-bc-label').textContent = r.name + ' 대학 지도';

  // Add university markers after zoom
  setTimeout(() => {
    const g = document.getElementById('uni-markers-overlay');
    g.style.display = '';
    g.innerHTML = (r.markers || []).map(m => `
      <g class="svg-uni-marker" style="cursor:pointer" data-uni="${m.name}"${m.new2028?' data-new2028="1"':''}>
        <circle cx="${m.x}" cy="${m.y}" r="1.4" fill="${m.color}" stroke="#fff" stroke-width="0.5"/>
        <rect class="uni-bg" rx="2" ry="2" fill="#fff" stroke="#e2e8f0" stroke-width="0.4" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.1))"/>
        <text class="uni-txt" x="${m.x + 5}" y="${m.y - 0.5}" font-size="4.2" font-weight="700" fill="#1e293b" font-family="'Pretendard Variable',Pretendard,sans-serif" dominant-baseline="central" alignment-baseline="central">${m.name}</text>
      </g>`).join('');
    // 텍스트 실측 후 rect 크기 맞추기
    g.querySelectorAll('.svg-uni-marker').forEach(mk => {
      const txt = mk.querySelector('.uni-txt');
      const bg = mk.querySelector('.uni-bg');
      const bb = txt.getBBox();
      const isNew = mk.dataset.new2028 === '1';
      bg.setAttribute('x', bb.x - 2);
      bg.setAttribute('y', bb.y - 1.5);
      bg.setAttribute('width', bb.width + (isNew ? 7 : 4));
      bg.setAttribute('height', bb.height + 3);
      if (isNew) {
        const cx = bb.x + bb.width + 2.5;
        const cy = bb.y + bb.height / 2;
        const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
        circle.setAttribute('cx', cx);
        circle.setAttribute('cy', cy);
        circle.setAttribute('r', '2');
        circle.setAttribute('fill', '#e11d48');
        const nTxt = document.createElementNS('http://www.w3.org/2000/svg','text');
        nTxt.setAttribute('x', cx);
        nTxt.setAttribute('y', cy);
        nTxt.setAttribute('font-size', '2.2');
        nTxt.setAttribute('font-weight', '800');
        nTxt.setAttribute('fill', '#fff');
        nTxt.setAttribute('text-anchor', 'middle');
        nTxt.setAttribute('dominant-baseline', 'central');
        nTxt.setAttribute('font-family', "'Apple SD Gothic Neo','Malgun Gothic',sans-serif");
        nTxt.textContent = 'N';
        mk.appendChild(circle);
        mk.appendChild(nTxt);
      }
      // 클릭 핸들러
      mk.addEventListener('click', () => {
        g.querySelectorAll('.svg-uni-marker').forEach(m => m.classList.remove('selected'));
        mk.classList.add('selected');
        const region = REGIONS[selectedRegion];
        if (region && region.detailPage) {
          // 상세 페이지를 iframe으로 오른쪽 패널에 로드
          const panel = document.getElementById('info-panel');
          panel.classList.add('wide');
          panel.style.width = '50%';
          panel.innerHTML = `<iframe src="${region.detailPage}?uni=${encodeURIComponent(mk.dataset.uni)}&embed=1" style="width:100%;height:100%;border:none"></iframe>`;
        } else {
          selectUniversityInPanel(mk.dataset.uni);
        }
      });
    });

    // 경기 지도일 때 서울 바로가기 라벨 추가
    if (key === 'gyeonggi') {
      const sx = 400, sy = 230;
      const seoulLink = document.createElementNS('http://www.w3.org/2000/svg','g');
      seoulLink.setAttribute('style','cursor:pointer');
      seoulLink.innerHTML = `
        <rect rx="3" ry="3" x="${sx-14}" y="${sy-5}" width="28" height="10" fill="#fff" stroke="#93c5fd" stroke-width="0.5" style="filter:drop-shadow(0 1px 3px rgba(0,0,0,.12))"/>
        <text x="${sx}" y="${sy}" font-size="5" font-weight="800" fill="#2563eb" font-family="'Pretendard Variable',Pretendard,sans-serif" text-anchor="middle" dominant-baseline="central">서울 →</text>`;
      seoulLink.addEventListener('click', () => { window.location.href = 'seoul.html'; });
      g.appendChild(seoulLink);
    }
  }, 400);

  // Render region info panel
  renderRegionInfo(key);
}

// ═══════════════════════════════════════════
// Select university in info panel
// ═══════════════════════════════════════════
function highlightMarker(uniName) {
  const g = document.getElementById('uni-markers-overlay');
  g.querySelectorAll('.svg-uni-marker').forEach(mk => {
    mk.classList.remove('selected');
    if (mk.dataset.uni && (uniName.includes(mk.dataset.uni) || mk.dataset.uni.includes(uniName.replace('학교','')))) {
      mk.classList.add('selected');
    }
  });
}

function clearMarkerHighlight() {
  const g = document.getElementById('uni-markers-overlay');
  g.querySelectorAll('.svg-uni-marker').forEach(mk => mk.classList.remove('selected'));
}

function openUniDetail(uniName) {
  const region = REGIONS[selectedRegion];
  if (region && region.detailPage) {
    // 마커도 선택 표시
    highlightMarker(uniName);
    const panel = document.getElementById('info-panel');
    panel.classList.add('wide');
    panel.style.width = '50%';
    panel.innerHTML = `<iframe src="${region.detailPage}?uni=${encodeURIComponent(uniName)}&embed=1" style="width:100%;height:100%;border:none"></iframe>`;
  }
}

function selectUniversityInPanel(uniName) {
  // 패널의 uni-item 중 매칭되는 항목 하이라이트 + 스크롤
  const items = document.querySelectorAll('#info-panel .uni-item');
  items.forEach(item => {
    const name = item.querySelector('.uni-name')?.textContent || '';
    if (name.includes(uniName) || uniName.includes(name.replace('학교',''))) {
      item.style.background = '#eff6ff';
      item.style.borderColor = '#93c5fd';
      item.style.transform = 'translateX(4px)';
      item.scrollIntoView({ behavior:'smooth', block:'center' });
    } else {
      item.style.background = '';
      item.style.borderColor = '';
      item.style.transform = '';
    }
  });
}

// ═══════════════════════════════════════════
// Reset map zoom to full Korea view
// ═══════════════════════════════════════════
function resetMapZoom() {
  const svg = document.getElementById('korea-svg');
  const currentVB = svg.getAttribute('viewBox');
  isZoomed = false;
  selectedRegion = null;

  // Reset region styles
  document.querySelectorAll('.region').forEach(el => {
    el.classList.remove('active', 'dimmed');
    el.style.pointerEvents = '';
  });

  // Show labels
  document.querySelectorAll('.map-label').forEach(l => l.style.display = '');
  document.getElementById('map-hint').style.display = '';

  // Hide breadcrumb
  document.getElementById('zoom-breadcrumb').style.display = 'none';

  // Remove markers
  document.getElementById('uni-markers-overlay').style.display = 'none';
  document.getElementById('uni-markers-overlay').innerHTML = '';

  // Animate back
  animateViewBox(svg, currentVB, FULL_VIEWBOX, 500);

  // Reset info panel
  document.getElementById('info-panel').innerHTML = `
    <div class="placeholder">
      <div class="placeholder-icon">🗺️</div>
      <h3>지역을 선택하세요</h3>
      <p>지도에서 관심 있는 지역을 클릭하면<br>해당 지역의 대학교 정보와<br>2027 입시 전형 안내를 볼 수 있습니다.</p>
    </div>`;
}

// ═══════════════════════════════════════════
// Korea Map: region click handlers
// ═══════════════════════════════════════════
document.querySelectorAll('.region[data-region]').forEach(el => {
  el.addEventListener('click', e => {
    if (isZoomed) return; // Prevent clicks while zoomed
    const key = el.dataset.region;
    if (key === 'seoul') {
      window.location.href = 'seoul.html';
    } else if (REGIONS[key] && REGIONS[key].zoomViewBox) {
      // Zoom into SVG for regions with zoomViewBox
      zoomToRegion(key);
    } else {
      // Dim/active logic (old behavior for regions without zoom)
      document.querySelectorAll('.region').forEach(r => { r.classList.remove('active'); r.classList.add('dimmed'); });
      document.querySelectorAll(`[data-region="${key}"]`).forEach(r => { r.classList.add('active'); r.classList.remove('dimmed'); });
      selectedRegion = key;
      renderRegionInfo(key);
    }
  });
});

// ═══════════════════════════════════════════
// Non-Seoul region info
// ═══════════════════════════════════════════
function renderRegionInfo(key) {
  const r = REGIONS[key];
  if (!r) return;
  const TAG_STYLES = {'수시':'tag-susi','정시':'tag-jeongsi','의예':'tag-med','치의예':'tag-med','한의예':'tag-med','수의예':'tag-med','논술':'tag-eng','교육':'tag-edu','사관학교':'tag-edu','첨단학과':'tag-eng'};
  const mapSec = (!isZoomed && r.mapImage) ? `<div class="sub-map"><img src="${r.mapImage}" alt="${r.mapLabel}"><div class="sub-map-label">${r.mapLabel}</div></div>` : '';
  const uniList = r.universities.map(u => {
    const allTags = [...u.tags,...(u.special||[])];
    const nBadge = u.new2028 ? '<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#e11d48;color:#fff;font-size:9px;font-weight:800;margin-left:4px;vertical-align:middle;line-height:1">N</span>' : '';
    return `<div class="uni-item" onmouseenter="highlightMarker('${u.name}')" onmouseleave="clearMarkerHighlight()" onclick="openUniDetail('${u.name}')" style="cursor:pointer">
      <div class="uni-item-top"><div class="uni-name">${u.name}${nBadge}</div>${u.national?'<span class="uni-national">국립</span>':''}</div>
      <div class="uni-location">📍 ${u.location}</div>
      <div class="uni-tags">${allTags.map(t=>`<span class="tag ${TAG_STYLES[t]||'tag-susi'}">${t}</span>`).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('info-panel').innerHTML = `
    <div class="region-content">
      <div class="region-header">
        <div class="region-color-bar" style="background:${r.color}"></div>
        <div class="region-name">${r.name}</div>
        <div class="region-meta">
          <span class="region-stat">대학 <strong>${r.universities.length}개교</strong></span>
          <span class="region-stat">${r.description}</span>
        </div>
      </div>
      ${mapSec}
      <div class="section-title">대학별 목록</div>
      <div class="uni-list">${uniList}</div>
    </div>`;
}

// ═══════════════════════════════════════════
// iframe에서 "목록으로" 클릭 시 복원
// ═══════════════════════════════════════════
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'backToList') {
    const panel = document.getElementById('info-panel');
    panel.classList.remove('wide');
    panel.style.width = '';
    // 마커 선택 해제
    document.querySelectorAll('.svg-uni-marker').forEach(m => m.classList.remove('selected'));
    // 현재 줌된 지역의 목록 다시 표시
    if (selectedRegion) renderRegionInfo(selectedRegion);
  }
});

// ── Resize Handle ──
(function() {
  const handle = document.getElementById('resize-handle');
  const panel = document.getElementById('info-panel');
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;cursor:col-resize;display:none';
  document.body.appendChild(overlay);
  let dragging = false, startX, startW;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('active');
    overlay.style.display = 'block';
    e.preventDefault();
  });

  overlay.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newW = startW - (e.clientX - startX);
    const min = 280, max = window.innerWidth * 0.75;
    panel.style.width = Math.max(min, Math.min(max, newW)) + 'px';
  });

  overlay.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('active');
    overlay.style.display = 'none';
  });
})();
</script>
