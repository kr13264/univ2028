    body { height:100vh; overflow:hidden; margin:0; }
    #info-panel { width:100%; min-width:100%; border-left:none; height:100vh; }

      { type:'종합', name:'큰사람',       count:500, minReq:'—', method:'❶ 서류100(3배수) ❷ 서류70+면접30' },
      { type:'종합', name:'지역인재',     count:300, minReq:'—', method:'❶ 서류100(3배수) ❷ 서류70+면접30' },
    ],
    minScore: [
      { name:'학생부교과', track:'의예과',     국:'○', 수:'○(미/기)', 영:'○', 탐:'과2', req:'4합5', note:'' },
      { name:'학생부교과', track:'치의예과',   국:'○', 수:'○(미/기)', 영:'○', 탐:'과2', req:'3합5', note:'' },
      { name:'학생부교과', track:'수의예과',   국:'○', 수:'○', 영:'○', 탐:'2', req:'3합6', note:'' },
    ],
    jeongsi: [

  '조선대학교': {

    susi: [

      { type:'종합', name:'학생부종합',   count:400, minReq:'—', method:'❶ 서류100(3배수) ❷ 서류70+면접30' },
    ],
    minScore: [
      { name:'학생부교과', track:'의예과',     국:'○', 수:'○(미/기)', 영:'○', 탐:'과2', req:'4합6', note:'' },
      { name:'학생부교과', track:'치의예과',   국:'○', 수:'○(미/기)', 영:'○', 탐:'과2', req:'3합6', note:'' },
    ],
    jeongsi: [
      { track:'인문', 국:30, 수:'25', 영:'20', 탐:25, 비고:'' },
      { track:'자연', 국:25, 수:'30', 영:'20', 탐:25, 비고:'' },
    ],
  },

  '원광대학교': {
    fullName: '원광대학교',
    location: '전북 익산',
    badges: ['jeolla', 'med'],
    changes: [],
    susi: [
      { type:'교과', name:'학생부교과',   count:550, minReq:'●', method:'학생부(교과) 100' },
      { type:'종합', name:'학생부종합',   count:350, minReq:'—', method:'❶ 서류100(3배수) ❷ 서류70+면접30' },
    ],
    minScore: [
      { name:'학생부교과', track:'의예과',     국:'○', 수:'○(미/기)', 영:'○', 탐:'과2', req:'4합6', note:'' },
      { name:'학생부교과', track:'한의예과',   국:'○', 수:'○(미/기)', 영:'○', 탐:'과2', req:'3합6', note:'' },
    ],
    jeongsi: [
      { track:'인문', 국:30, 수:'25', 영:'20', 탐:25, 비고:'' },
      { track:'자연', 국:25, 수:'30', 영:'20', 탐:25, 비고:'' },
    ],
  },

  '광주교대': {
    fullName: '광주교육대학교',
    location: '광주 북구',
    badges: ['jeolla', 'national'],
    changes: [],
    susi: [
      { type:'교과', name:'학생부교과',   count:80, minReq:'●', method:'학생부(교과) 100' },
      { type:'종합', name:'학생부종합',   count:60, minReq:'—', method:'❶ 서류100(3배수) ❷ 서류70+면접30' },
    ],

      { track:'전체', 국:30, 수:'25', 영:'20', 탐:25, 비고:'' },

// Back to list — tell parent to restore
function renderRegionSummary() {
  if (window.parent !== window) {
    window.parent.postMessage({type:'backToList'}, '*');
    return;
  }
}

function showUniversityDetail(key) {
  let _d = UNI_DETAILS[key]; if(!_d){const _f=Object.keys(UNI_DETAILS).find(k=>key.includes(k)||k.includes(key));if(_f)_d=UNI_DETAILS[_f];}
  const d = _d;
  document.getElementById('info-panel').classList.add('wide');

  if (!d) {
    document.getElementById('info-panel').innerHTML = `
      <div class="detail-page">
        <div class="detail-header">
          <div class="detail-nav">
            <button class="detail-back" onclick="renderRegionSummary()">← 목록으로</button>
          </div>
          <div class="detail-uni-name">${key}</div>
        </div>
        <div class="no-data">
          <div style="font-size:32px;margin-bottom:12px">📋</div>
          <div style="color:#64748b;font-size:14px;font-weight:600">상세 정보 준비중</div>
          <div style="color:#334155;font-size:13px;margin-top:8px">2027 모집요강 발표 후 업데이트 예정입니다</div>
        </div>
      </div>`;
    return;
  }

  const badgeHtml = (d.badges||[]).map(b => {
    if(b==='seoul') return '<span class="detail-badge badge-seoul">서울권</span>';
    if(b==='gyeonggi') return '<span class="detail-badge badge-gyeonggi">경기·인천권</span>';
    if(b==='chungcheong') return '<span class="detail-badge badge-gyeonggi">충청·대전·세종권</span>';
    if(b==='gangwon') return '<span class="detail-badge badge-gyeonggi">강원권</span>';
    if(b==='gyeongsang') return '<span class="detail-badge badge-gyeonggi">경상·대구·부산권</span>';
    if(b==='jeolla') return '<span class="detail-badge badge-gyeonggi">전라·광주권</span>';
    if(b==='jeju') return '<span class="detail-badge badge-gyeonggi">제주권</span>';
    if(b==='national') return '<span class="detail-badge badge-national">국립</span>';
    if(b==='med') return '<span class="detail-badge badge-med">의학계열</span>';
    return '';
  }).join('');

  // Changes section
  const changesHtml = (d.changes||[]).map(c => `
    <div class="change-item">
      <div class="change-title">▪ ${c.title}</div>
      <div class="change-arrow">
        <span class="from">2026: ${c.from}</span>
        <span class="arr">→</span>
        <span class="to">2027: ${c.to}</span>
      </div>
    </div>`).join('');

  // 수시 table
  const susiRows = (d.susi||[]).map(r => {
    const typeClass = r.type==='교과'?'gyogwa':r.type==='종합'?'jonghap':'nonsul';
    const minHtml = r.minReq && r.minReq!=='—'
      ? `<span class="dot-req">${r.minReq}</span>` : `<span style="color:#334155">—</span>`;
    return `<tr>
      <td class="td-type ${typeClass}">${r.type}</td>
      <td class="td-name">${r.name}</td>
      <td class="td-count">${r.count}</td>
      <td class="td-min">${minHtml}</td>
      <td class="td-method">${r.method.replace(/❶/g,'<span class="step">❶</span>').replace(/❷/g,'<span class="step">❷</span>')}</td>
    </tr>`;
  }).join('');

  // Min score table
  const minRows = (d.minScore||[]).map(r => `<tr>
    <td class="row-name" style="color:#e2e8f0;font-weight:700;white-space:nowrap">${r.name}</td>
    <td class="row-track" style="color:#64748b;font-size:13px">${r.track}</td>
    <td class="td-ok">${r.국||'—'}</td>
    <td>${r.수==='☆'?`<span style="color:#fbbf24">☆</span>`:(r.수||'—')}</td>
    <td class="td-ok">${r.영||'—'}</td>
    <td style="text-align:center;color:#64748b">${r.탐||'—'}</td>
    <td class="td-req">${r.req}</td>
    <td class="td-note">${r.note||''}</td>
  </tr>`).join('');

  // Jeongsi table
  const jeongsiRows = (d.jeongsi||[]).map(r => `<tr>
    <td class="td-track" style="text-align:left;color:#1e293b;font-weight:600;white-space:nowrap">${r.track}</td>
    <td class="pct">${r.국}</td>
    <td class="pct-hi">${r.수}</td>
    <td>${r.영}</td>
    <td class="pct">${r.탐}</td>
    <td style="color:#64748b;font-size:13px;text-align:left">${r.비고||''}</td>
  </tr>`).join('');

  document.getElementById('info-panel').innerHTML = `
  <div class="detail-page">
    <div class="detail-header">
      <div class="detail-nav">
        <button class="detail-back" onclick="renderRegionSummary()">← 목록으로</button>
      </div>
      <div class="detail-uni-name">${d.fullName}</div>
      <div class="detail-badges">${badgeHtml}</div>
    </div>
    <div class="detail-body">

      ${d.changes && d.changes.length ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#f59e0b">1. 전년도와 차이점 (주요 변경사항)</div>
        <div class="changes-box">${changesHtml}</div>
      </div>` : ''}

      ${d.susi && d.susi.length ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#3b82f6">2. 수시모집 — 전형방법</div>
        <table class="adm-table">
          <thead><tr>
            <th class="th-susi" style="width:38px">구분</th>
            <th class="th-susi">전형명</th>
            <th class="th-susi" style="width:44px">인원</th>
            <th class="th-susi" style="width:44px">최저</th>
            <th class="th-susi">전형방법</th>
          </tr></thead>
          <tbody>${susiRows}</tbody>
        </table>
      </div>` : ''}

      ${d.minScore && d.minScore.length ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#a78bfa">3. 수시모집 — 최저학력기준</div>
        <table class="adm-table min-table">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569">전형</th>
            <th style="background:#f1f5f9;color:#475569">계열</th>
            <th style="background:#f1f5f9;color:#475569">국</th>
            <th style="background:#f1f5f9;color:#475569">수</th>
            <th style="background:#f1f5f9;color:#475569">영</th>
            <th style="background:#f1f5f9;color:#475569">탐</th>
            <th style="background:#f1f5f9;color:#475569">최저</th>
            <th style="background:#f1f5f9;color:#475569">비고</th>
          </tr></thead>
          <tbody>${minRows}</tbody>
        </table>
        <div style="font-size:13px;color:#475569;margin-top:6px">☆ = 수학 필수 / ○ = 해당 영역</div>
      </div>` : ''}

      ${d.jeongsi && d.jeongsi.length ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#7dd3fc">4. 정시모집 — 수능 반영</div>
        <table class="adm-table jeongsi-table">
          <thead><tr>
            <th class="th-jeongsi">계열</th>
            <th class="th-jeongsi">국어</th>
            <th class="th-jeongsi">수학</th>
            <th class="th-jeongsi">영어</th>
            <th class="th-jeongsi">탐구</th>
            <th class="th-jeongsi" style="text-align:left">비고</th>
          </tr></thead>
          <tbody>${jeongsiRows}</tbody>
        </table>
      </div>` : ''}

      ${d.top10Susi ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#f59e0b">원서접수 TOP 10 — 수시 (2025학년도)</div>
        <table class="adm-table" style="font-size:13px">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569;width:24px">#</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">모집단위</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">전형명</th>
            <th style="background:#f1f5f9;color:#475569;width:40px">모집</th>
            <th style="background:#f1f5f9;color:#475569;width:48px">지원</th>
            <th style="background:#f1f5f9;color:#475569;width:60px">경쟁률</th>
          </tr></thead>
          <tbody>${d.top10Susi.map(r => `<tr>
            <td style="text-align:center;font-weight:800;color:#f59e0b">${r.rank}</td>
            <td style="text-align:left;font-weight:600;color:#1e293b">${r.dept}</td>
            <td style="text-align:left;font-size:13px;color:#64748b">${r.type}</td>
            <td style="text-align:center;font-weight:700;color:#3b82f6">${r.모집}</td>
            <td style="text-align:center;color:#475569">${r.지원.toLocaleString()}</td>
            <td style="text-align:center;font-weight:700;color:#dc2626">${r.경쟁}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      ${d.top10Jeongsi ? `
      <div class="detail-section">
        <div class="detail-section-title" style="--accent:#0ea5e9">원서접수 TOP 10 — 정시 (2025학년도)</div>
        <table class="adm-table" style="font-size:13px">
          <thead><tr>
            <th style="background:#f1f5f9;color:#475569;width:24px">#</th>
            <th style="background:#f1f5f9;color:#475569;width:50px">시기</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">모집단위</th>
            <th style="background:#f1f5f9;color:#475569;text-align:left">전형명</th>
            <th style="background:#f1f5f9;color:#475569;width:40px">모집</th>
            <th style="background:#f1f5f9;color:#475569;width:48px">지원</th>
            <th style="background:#f1f5f9;color:#475569;width:60px">경쟁률</th>
          </tr></thead>
          <tbody>${d.top10Jeongsi.map(r => `<tr>
            <td style="text-align:center;font-weight:800;color:#0ea5e9">${r.rank}</td>
            <td style="text-align:center;font-size:13px;color:#64748b">${r.시기}</td>
            <td style="text-align:left;font-weight:600;color:#1e293b">${r.dept}</td>
            <td style="text-align:left;font-size:13px;color:#64748b">${r.type}</td>
            <td style="text-align:center;font-weight:700;color:#3b82f6">${r.모집}</td>
            <td style="text-align:center;color:#475569">${r.지원.toLocaleString()}</td>
            <td style="text-align:center;font-weight:700;color:#dc2626">${r.경쟁}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      <div class="detail-note">
        <strong>※ 주의사항</strong><br>
        본 자료는 2027 대입전형 시행계획 기준으로 작성되었습니다.<br>
        세부 모집인원 및 일정은 각 대학 모집요강(5월 말 발표 예정)을 반드시 확인하시기 바랍니다.<br>
        경쟁률·취업률 등 통계자료 출처: <strong>adiga.kr</strong> (대입정보포털)
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// Init: read URL params and show detail
// ═══════════════════════════════════════════
(function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const targetUni = urlParams.get('uni');
  if (targetUni) {
    showUniversityDetail(targetUni);
  } else {
    document.getElementById('info-panel').innerHTML = '<div style="padding:40px;text-align:center;color:#64748b">대학을 선택해주세요</div>';
  }
})();
</script>
</body>
</html>
