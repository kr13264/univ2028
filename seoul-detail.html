// Back to list — tell parent to restore
function renderSeoulSummary() {
  if (window.parent !== window) {
    window.parent.postMessage({type:'backToList'}, '*');
    return;
  }
}

function showUniversityDetail(key) {
  let _d = UNI_DETAILS[key]; if(!_d){const _f=Object.keys(UNI_DETAILS).find(k=>key.includes(k)||k.includes(key));if(_f)_d=UNI_DETAILS[_f];}
  const d = _d;
  document.getElementById('info-panel').classList.add('wide');

  if (!d) {
    document.getElementById('info-panel').innerHTML = `
      <div class="detail-page">
        <div class="detail-header">
          <div class="detail-nav">
            <button class="detail-back" onclick="renderSeoulSummary()">← 목록으로</button>
          </div>
          <div class="detail-uni-name">${key}</div>
        </div>
        <div class="no-data">
          <div style="font-size:32px;margin-bottom:12px">📋</div>
          <div style="color:#64748b;font-size:14px;font-weight:600">상세 정보 준비중</div>
          <div style="color:#334155;font-size:15px;margin-top:8px">2027 모집요강 발표 후 업데이트 예정입니다</div>
        </div>
      </div>`;
    return;
  }

  const badgeHtml = (d.badges||[]).map(b => {
    if(b==='seoul') return '<span class="detail-badge badge-seoul">서울권</span>';
    if(b==='gyeonggi') return '<span class="detail-badge badge-gyeonggi">경기·인천권</span>';
    if(b==='national') return '<span class="detail-badge badge-national">국립</span>';
    if(b==='med') return '<span class="detail-badge badge-med">의학계열</span>';
    if(b==='new2028') return '<span class="detail-badge" style="background:#fef3c7;color:#92400e;border:1px solid #fde68a">2028 변경</span>';
    return '';
  }).join('');

  // Changes section
  const changesHtml = (d.changes||[]).map(c => `
    <div class="change-item">
      <div class="change-title">▪ ${c.title}</div>
      <div class="change-arrow">
        <span class="from">2027: ${c.from}</span>
        <span class="arr">→</span>
        <span class="to">2028: ${c.to}</span>
      </div>
    </div>`).join('');

  // 수시 table
  const susiRows = (d.susi||[]).map(r => {
    const typeClass = r.type==='교과'?'gyogwa':r.type==='종합'?'jonghap':'nonsul';
    const minHtml = r.minReq && r.minReq!=='—'
      ? `<span class="dot-req">${r.minReq}</span>` : `<span style="color:#334155">—</span>`;
    return `<tr>
      <td class="td-type ${typeClass}">${r.type}</td>
      <td class="td-name">${r.name}</td>
      <td class="td-count">${r.count}</td>
      <td class="td-min">${minHtml}</td>
      <td class="td-method">${r.method.replace(/❶/g,'<span class="step">❶</span>').replace(/❷/g,'<span class="step">❷</span>')}</td>
    </tr>`;
  }).join('');

  // Min score table
  const minRows = (d.minScore||[]).map(r => `<tr>
    <td class="row-name" style="color:#1e293b;font-weight:700;white-space:nowrap">${r.name}</td>
    <td class="row-track" style="color:#475569;font-size:15px">${r.track}</td>
    <td class="td-ok">${r.국||'—'}</td>
    <td>${r.수==='☆'?`<span style="color:#fbbf24">☆</span>`:(r.수||'—')}</td>
    <td class="td-ok">${r.영||'—'}</td>
    <td style="text-align:center;color:#475569">${r.탐||'—'}</td>
    <td class="td-req">${r.req}</td>
    <td class="td-note">${r.note||''}</td>
  </tr>`).join('');

  // Jeongsi table — handles both old format (수/탐) and new extended format (수확/수미기/탐사/탐과)
  let jeongsiRows = '';
  let jeongsiIsExtended = d.jeongsi && d.jeongsi.length && d.jeongsi[0].수확 !== undefined;
  if (jeongsiIsExtended) {
    jeongsiRows = (d.jeongsi||[]).map(r => `<tr>
      <td class="td-track" style="text-align:left;font-weight:600;white-space:nowrap">${r.track}</td>

  } else {
    jeongsiRows = (d.jeongsi||[]).map(r => `<tr>
      <td class="td-track" style="text-align:left;font-weight:600;white-space:nowrap">${r.track}</td>
      <td class="pct">${r.국}</td>
      <td class="pct-hi">${r.수}</td>
      <td>${r.영}</td>
      <td class="pct">${r.탐}</td>
      <td style="color:#64748b;font-size:15px;text-align:left">${r.비고||''}</td>
    </tr>`).join('');
  }

  // 학생부반영방법 section
  let hakbuHtml = '';
  if (d.hakbu) {
