// ═══════════════════════════════════════════
// Initialize: inject markers and show Seoul summary
// ═══════════════════════════════════════════
(function init() {
  const imgSrc = 'images/seoul-map.png';
  const markers = SEOUL_MARKERS;

  const container = document.getElementById('uni-map-container');
  container.innerHTML = `<img src="${imgSrc}" alt="서울 대학 지도" draggable="false"><div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.5);pointer-events:none;border-radius:8px"></div>`;

  // Inject university markers
  markers.forEach(([key, x, y, side, color]) => {
    const btn = document.createElement('button');
    btn.className = 'uni-marker';
    btn.title = key;
    btn.style.cssText = `left:${x}%;top:${y}%;position:absolute;background:none;border:none;padding:2px;`;

    const dot = document.createElement('span');
    dot.className = 'uni-dot';
    dot.style.background = color;

    const label = document.createElement('span');
    label.className = 'uni-label';
    const det = UNI_DETAILS[key];
    const isNew = det && (det.badges||[]).includes('new2028');
    label.innerHTML = key + (isNew ? ' <span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#e11d48;color:#fff;font-size:13px;font-weight:800;line-height:1">N</span>' : '');
    label.style.color = color === '#374151' ? '#1a1a1a' : color;

    const wrap = document.createElement('span');
    wrap.className = 'uni-label-wrap';
    if (side === 'l') {
      wrap.appendChild(label);
      wrap.appendChild(dot);
      btn.style.transform = 'translate(-100%, -50%)';
    } else {
      wrap.appendChild(dot);
      wrap.appendChild(label);
      btn.style.transform = 'translate(0%, -50%)';
    }
    btn.appendChild(wrap);

    btn.addEventListener('click', () => {
      document.querySelectorAll('.uni-marker').forEach(m => m.classList.remove('selected'));
      btn.classList.add('selected');
      // iframe으로 상세 페이지 로드
      const panel = document.getElementById('info-panel');
      panel.classList.add('wide');
      panel.style.width = '50%';
      panel.innerHTML = `<iframe src="seoul-detail.html?uni=${encodeURIComponent(key)}&embed=1" style="width:100%;height:100%;border:none"></iframe>`;
    });

    container.appendChild(btn);
  });

  // Show Seoul summary in info panel
  renderSeoulSummary();
})();

// iframe에서 "목록으로" 클릭 시 복원
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'backToList') {
    const panel = document.getElementById('info-panel');
    panel.classList.remove('wide');
    panel.style.width = '';
    document.querySelectorAll('.uni-marker').forEach(m => m.classList.remove('selected'));
    renderSeoulSummary();
  }
});

// ── Resize Handle ──
(function() {
  const handle = document.getElementById('resize-handle');
  const panel = document.getElementById('info-panel');
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;cursor:col-resize;display:none';
  document.body.appendChild(overlay);
  let dragging = false, startX, startW;

  function stopDrag() {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('active');
    overlay.style.display = 'none';
  }

  function onMove(e) {
    if (!dragging) return;
    const newW = startW - (e.clientX - startX);
    const min = 280, max = window.innerWidth * 0.75;
    panel.style.width = Math.max(min, Math.min(max, newW)) + 'px';
  }

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('active');
    overlay.style.display = 'block';
    e.preventDefault();
  });

  document.addEventListener('mousemove', onMove);
  overlay.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', stopDrag);
  overlay.addEventListener('mouseup', stopDrag);
})();
</script>
